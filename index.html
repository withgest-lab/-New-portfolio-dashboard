<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>자산 포트폴리오 대시보드</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
  :root {
    --color-background-primary: #ffffff;
    --color-background-secondary: #f2f2f7;
    --color-background-tertiary: #e5e5ea;
    --color-border-tertiary: #e5e5ea;
    --color-text-primary: #1c1c1e;
    --color-text-secondary: #636366;
    --color-text-tertiary: #8e8e93;
    --color-up: #ff3b30;
    --color-down: #007aff;
    --color-accent: #007aff;
    --color-card: #ffffff;
    --color-section-bg: #f2f2f7;
    --radius-card: 16px;
    --radius-btn: 10px;
    font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--color-section-bg); color: var(--color-text-primary); font-size: 14px; line-height: 1.5; }

  /* ── 상단 헤더 ── */
  .top-bar {
    background: var(--color-card);
    border-bottom: 1px solid var(--color-border-tertiary);
    padding: 0 16px;
    display: flex; align-items: center; justify-content: space-between;
    height: 52px; gap: 8px;
  }
  .top-bar .logo { font-size: 17px; font-weight: 700; letter-spacing: -.04em; flex-shrink: 0; }
  .top-bar .logo span { color: var(--color-accent); }
  .top-bar .actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
  .fetch-status { display: flex; align-items: center; gap: 5px; font-size: 11px; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #8e8e93; flex-shrink: 0; }
  .status-dot.ok { background: #34c759; }
  .status-dot.err { background: #ff3b30; }
  .status-dot.loading { background: #ff9500; animation: pulse .8s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* ── 메인 레이아웃 ── */
  .main { max-width: 1280px; margin: 0 auto; padding: 16px 12px 48px; display: flex; flex-direction: column; gap: 16px; }

  /* ── 카드 ── */
  .card { background: var(--color-card); border-radius: var(--radius-card); border: 1px solid var(--color-border-tertiary); padding: 16px; }
  .section-label { font-size: 11px; font-weight: 600; color: var(--color-text-tertiary); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 12px; }

  /* ── 버튼 ── */
  .btn { border: none; cursor: pointer; border-radius: var(--radius-btn); font-family: inherit; font-size: 12px; font-weight: 600; padding: 6px 12px; transition: opacity .15s, transform .1s; }
  .btn:active { transform: scale(.97); }
  .btn-primary { background: var(--color-accent); color: #fff; }
  .btn-ghost { background: var(--color-section-bg); color: var(--color-text-primary); }
  .btn-snap { background: var(--color-accent); color: #fff; }
  .btn-fetch { background: #34c75920; color: #34c759; }
  .btn-sheets { background: #34a85320; color: #34a853; }

  /* ── 기간 탭 ── */
  .period-tabs { display: flex; background: var(--color-section-bg); border-radius: 10px; padding: 3px; gap: 1px; flex-wrap: wrap; }
  .period-tabs button { border: none; cursor: pointer; border-radius: 7px; padding: 4px 7px; font-size: 11px; font-weight: 600; font-family: inherit; background: transparent; color: var(--color-text-secondary); transition: background .15s, color .15s; }
  .period-tabs button.active { background: var(--color-card); color: var(--color-text-primary); box-shadow: 0 1px 4px rgba(0,0,0,.1); }

  /* ── 종목 토글 ── */
  .asset-toggles { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
  .toggle-pill { border: none; cursor: pointer; border-radius: 20px; padding: 3px 10px; font-size: 11px; font-weight: 600; font-family: inherit; transition: opacity .15s; opacity: .35; }
  .toggle-pill.on { opacity: 1; }
  .toggle-ctrl { background: var(--color-section-bg); color: var(--color-text-primary); border: none; cursor: pointer; border-radius: 20px; padding: 3px 10px; font-size: 11px; font-weight: 600; font-family: inherit; }

  /* ── 라인 차트 ── */
  .chart-wrap { position: relative; margin-top: 10px; }
  canvas#lineChart { width: 100% !important; display: block; }
  .stat-bar { display: flex; gap: 16px; margin-top: 12px; flex-wrap: wrap; }
  .stat-item .stat-label { font-size: 10px; color: var(--color-text-tertiary); }
  .stat-item .stat-val { font-size: 13px; font-weight: 700; letter-spacing: -.02em; }
  .stat-item .stat-sub { font-size: 10px; color: var(--color-text-tertiary); }

  /* ── 요약 카드 4개 ── */
  .summary-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; }
  .sum-card { background: var(--color-card); border-radius: var(--radius-card); border: 1px solid var(--color-border-tertiary); padding: 14px 12px; }
  .sum-card .sum-label { font-size: 10px; font-weight: 600; color: var(--color-text-tertiary); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
  .sum-card .sum-val { font-size: 18px; font-weight: 800; letter-spacing: -.04em; }
  .sum-card .sum-sub { font-size: 11px; margin-top: 3px; }

  /* ── 자산 테이블 ── */
  .asset-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { font-size: 10px; font-weight: 600; color: var(--color-text-tertiary); text-transform: uppercase; letter-spacing: .05em; text-align: right; padding: 7px 8px; border-bottom: 1px solid var(--color-border-tertiary); white-space: nowrap; }
  th:first-child, th:nth-child(2) { text-align: left; }
  td { padding: 9px 8px; border-bottom: 1px solid var(--color-section-bg); text-align: right; white-space: nowrap; vertical-align: middle; }
  td:first-child, td:nth-child(2) { text-align: left; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--color-section-bg); }
  .ticker-badge { font-size: 10px; color: var(--color-text-tertiary); margin-left: 3px; }
  .cat-badge { display: inline-flex; align-items: center; justify-content: center; border-radius: 5px; padding: 1px 6px; font-size: 11px; font-weight: 700; min-width: 22px; }
  .up { color: var(--color-up); }
  .dn { color: var(--color-down); }
  .edit-btn, .del-btn { border: none; cursor: pointer; background: transparent; font-size: 14px; padding: 2px 3px; border-radius: 5px; }
  .inline-edit-row td { background: #f2f7ff !important; }
  .inline-edit-row input { border: 1px solid var(--color-accent); border-radius: 7px; padding: 4px 8px; font-family: inherit; font-size: 12px; width: 90px; }

  /* ── 종목 추가 폼 ── */
  .add-form { display: flex; gap: 6px; flex-wrap: wrap; padding-top: 14px; border-top: 1px solid var(--color-border-tertiary); margin-top: 8px; align-items: flex-end; }
  .add-form label { font-size: 10px; color: var(--color-text-tertiary); display: flex; flex-direction: column; gap: 3px; }
  .add-form input, .add-form select { border: 1px solid var(--color-border-tertiary); border-radius: 7px; padding: 5px 8px; font-family: inherit; font-size: 12px; background: var(--color-card); color: var(--color-text-primary); }

  /* ── 도넛 & 막대 ── */
  .donut-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .donut-card { background: var(--color-card); border-radius: var(--radius-card); border: 1px solid var(--color-border-tertiary); padding: 16px; }
  .donut-canvas-wrap { position: relative; }
  .donut-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
  .donut-center .dc-label { font-size: 11px; color: var(--color-text-tertiary); }
  .donut-center .dc-val { font-size: 15px; font-weight: 800; letter-spacing: -.03em; color: #1c1c1e; }

  /* ── 글로벌 시장 ── */
  .index-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px,1fr)); gap: 8px; }
  .index-card { background: var(--color-card); border-radius: var(--radius-card); border: 1px solid var(--color-border-tertiary); padding: 12px 10px; }
  .index-name { font-size: 10px; color: var(--color-text-tertiary); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }
  .index-val { font-size: 14px; font-weight: 800; letter-spacing: -.03em; margin-top: 3px; }
  .index-chg { font-size: 11px; font-weight: 600; margin-top: 2px; }

  /* ── 스냅샷 ── */
  .snap-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .notice { font-size: 11px; color: var(--color-text-tertiary); padding: 6px 0 0; }
  .yahoo-note { font-size: 10px; color: var(--color-text-tertiary); margin-top: 4px; }

  /* ════════════════════════════════════════
     Z Fold7 접힌 상태 — 커버 화면 ~412px
     세로형 폰처럼 1열 레이아웃
  ════════════════════════════════════════ */
  @media (max-width: 480px) {
    .top-bar { padding: 0 12px; height: 48px; }
    .top-bar .logo { font-size: 15px; }
    .fetch-status span { display: none; } /* 상태 텍스트 숨김, 점만 표시 */
    .btn { font-size: 11px; padding: 5px 10px; }

    .main { padding: 10px 8px 40px; gap: 12px; }
    .card { padding: 12px; border-radius: 12px; }
    .section-label { font-size: 10px; margin-bottom: 10px; }

    /* 기간 탭: 2줄로 */
    .period-tabs { gap: 1px; }
    .period-tabs button { padding: 3px 6px; font-size: 10px; }

    /* 토글 pill 작게 */
    .toggle-pill, .toggle-ctrl { font-size: 10px; padding: 2px 8px; }

    /* 요약 카드: 2x2 */
    .summary-grid { grid-template-columns: repeat(2,1fr); gap: 8px; }
    .sum-card { padding: 12px 10px; }
    .sum-card .sum-val { font-size: 16px; }
    .sum-card .sum-label { font-size: 9px; }

    /* 테이블: 핵심 컬럼만 — 투자원금·평균단가 숨김 */
    .col-hide-fold { display: none; }
    td, th { padding: 7px 6px; font-size: 11px; }
    .ticker-badge { display: none; }

    /* 도넛: 1열 */
    .donut-grid { grid-template-columns: 1fr; }

    /* 지수 카드: 4열 */
    .index-grid { grid-template-columns: repeat(4,1fr); gap: 6px; }
    .index-card { padding: 10px 6px; }
    .index-val { font-size: 12px; }
    .index-chg { font-size: 10px; }

    /* 추가 폼: 세로 정렬 */
    .add-form { flex-direction: column; align-items: stretch; }
    .add-form label { width: 100%; }
    .add-form input, .add-form select { width: 100%; }

    /* 스냅샷 테이블 간소화 */
    .col-hide-snap { display: none; }
  }

  /* ════════════════════════════════════════
     Z Fold7 펼친 상태 — 메인 화면 ~840px
     태블릿형 2열 레이아웃 최적화
  ════════════════════════════════════════ */
  @media (min-width: 600px) and (max-width: 960px) {
    .main { padding: 20px 16px 48px; gap: 20px; }
    .card { padding: 18px; }

    /* 요약 카드: 4열 유지, 폰트 조정 */
    .summary-grid { grid-template-columns: repeat(4,1fr); gap: 10px; }
    .sum-card .sum-val { font-size: 20px; }

    /* 도넛 그리드: 2열 유지 */
    .donut-grid { grid-template-columns: 1fr 1fr; }

    /* 지수: 4열 */
    .index-grid { grid-template-columns: repeat(4,1fr); }

    /* 기간 탭 한 줄에 맞게 */
    .period-tabs button { padding: 5px 8px; }
  }
</style>
</head>
<body>

<div class="top-bar">
  <div class="logo">자산<span>트래커</span></div>
  <div class="actions">
    <div class="fetch-status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">준비 중...</span>
    </div>
    <button class="btn btn-fetch" onclick="fetchAllPrices()">🔄 시세 갱신</button>
    <button class="btn btn-snap" onclick="saveSnap()">📸 스냅샷</button>
    <button class="btn btn-sheets" onclick="saveToGoogleSheets()" id="sheetsBtn">📤 구글 시트</button>
  </div>
</div>

<!-- 구글 시트 저장 모달 -->
<div id="sheetsModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:16px;padding:24px;max-width:360px;width:90%;margin:0 auto;">
    <div style="font-size:16px;font-weight:700;margin-bottom:8px;">📤 구글 시트로 저장</div>
    <div style="font-size:13px;color:#636366;margin-bottom:16px;">구글 드라이브에 저장할 파일 이름을 입력하세요.</div>
    <input id="sheetsFileName" type="text" style="width:100%;border:1px solid #e5e5ea;border-radius:8px;padding:8px 12px;font-size:13px;font-family:inherit;margin-bottom:16px;"
      placeholder="포트폴리오-백업-2025-05-23">
    <div style="display:flex;gap:8px;justify-content:flex-end;">
      <button class="btn btn-ghost" onclick="closeSheetModal()">취소</button>
      <button class="btn btn-primary" onclick="confirmSaveSheets()">저장</button>
    </div>
    <div id="sheetsStatus" style="font-size:12px;color:#636366;margin-top:12px;min-height:18px;"></div>
  </div>
</div>

<div class="main">

  <!-- 1. 자산 변화 그래프 -->
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
      <div class="section-label" style="margin:0">자산 변화 그래프</div>
      <div class="period-tabs" id="periodTabs">
        <button onclick="setPeriod('1D')" class="active">1D</button>
        <button onclick="setPeriod('1W')">1W</button>
        <button onclick="setPeriod('1M')">1M</button>
        <button onclick="setPeriod('3M')">3M</button>
        <button onclick="setPeriod('6M')">6M</button>
        <button onclick="setPeriod('YTD')">YTD</button>
        <button onclick="setPeriod('1Y')">1Y</button>
        <button onclick="setPeriod('3Y')">3Y</button>
        <button onclick="setPeriod('5Y')">5Y</button>
        <button onclick="setPeriod('ALL')">ALL</button>
      </div>
    </div>
    <div class="asset-toggles" id="assetToggles"></div>
    <div class="chart-wrap"><canvas id="lineChart" height="260"></canvas></div>
    <div class="stat-bar" id="statBar"></div>
  </div>

  <!-- 2. 전체 자산 현황 -->
  <div class="summary-grid" id="summaryGrid"></div>

  <!-- 3. 자산 목록 -->
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <div class="section-label" style="margin:0">자산 목록</div>
      <div class="yahoo-note">※ 야후 파이낸스 데이터 (15~20분 지연)</div>
    </div>
    <div class="asset-table-wrap">
      <table id="assetTable">
        <thead>
          <tr>
            <th>종목</th><th>구분</th><th>현재가</th><th>전일比</th>
            <th class="col-hide-fold">평균단가</th><th>수량</th>
            <th class="col-hide-fold">투자원금</th><th>평가금액</th>
            <th>평가손익</th><th>수익률</th><th>편집</th>
          </tr>
        </thead>
        <tbody id="assetTbody"></tbody>
      </table>
    </div>
    <div class="add-form">
      <label>종목명<input id="af_name" placeholder="" style="width:110px"></label>
      <label>티커<input id="af_ticker" placeholder="" style="width:100px"></label>
      <label>구분<select id="af_cat">
        <option value="">-- 선택 --</option>
        <option value="stock_kr">국내주식</option>
        <option value="stock_us">미국주식</option>
        <option value="stock_jp">일본주식</option>
        <option value="pension_personal">개인연금</option>
        <option value="pension_retirement">퇴직연금</option>
        <option value="crypto">가상자산</option>
        <option value="cash">현금</option>
      </select></label>
      <label>수량<input id="af_qty" type="number" placeholder="" style="width:80px"></label>
      <label>평균단가<input id="af_price" type="number" placeholder="" style="width:100px"></label>
      <label>통화<select id="af_cur">
        <option value="KRW">KRW ₩</option>
        <option value="USD">USD $</option>
        <option value="JPY">JPY ¥</option>
      </select></label>
      <button class="btn btn-primary" onclick="addAsset()">+ 추가</button>
    </div>
    <div id="addAssetStatus" style="font-size:12px;color:#636366;padding-top:8px;min-height:18px;"></div>
  </div>

  <!-- 4. 비중 현황 -->
  <div class="card">
    <div style="display:flex;gap:32px;align-items:flex-start;flex-wrap:wrap;">

      <!-- 왼쪽: 카테고리 도넛 -->
      <div style="display:flex;flex-direction:column;align-items:center;flex-shrink:0;">
        <div class="section-label" style="align-self:flex-start;">카테고리 비중</div>
        <div class="donut-canvas-wrap">
          <canvas id="catDonut" width="340" height="280"></canvas>
          <div class="donut-center">
            <div class="dc-label">총 자산</div>
            <div class="dc-val" id="catCenter">—</div>
          </div>
        </div>
        <div id="catLegend" style="display:flex;flex-wrap:wrap;gap:8px 16px;justify-content:center;margin-top:12px;max-width:340px;"></div>
      </div>

      <!-- 오른쪽: 종목 비중 막대 -->
      <div style="flex:1;min-width:260px;">
        <div class="section-label">종목 비중</div>
        <div id="barChart" style="display:flex;flex-direction:column;gap:10px;"></div>
      </div>

    </div>
  </div>

  <!-- 5. 글로벌 시장 -->
  <div class="card">
    <div class="section-label">글로벌 시장</div>
    <div class="index-grid" id="indexGrid"></div>
    <div class="notice">※ 야후 파이낸스 기준 (15~20분 지연). 15분마다 자동 갱신됩니다.</div>
  </div>

  <!-- 6. 스냅샷 이력 -->
  <div class="card">
    <div class="snap-header">
      <div class="section-label" style="margin:0">스냅샷 이력</div>
      <button class="btn btn-ghost" onclick="clearSnaps()">이력 초기화</button>
    </div>
    <div class="asset-table-wrap">
      <table>
        <thead>
          <tr>
            <th style="text-align:left">저장 시각</th>
            <th>총 평가금액</th><th class="col-hide-snap">전 스냅샷 대비</th><th>변화율</th><th>삭제</th>
          </tr>
        </thead>
        <tbody id="snapTbody"></tbody>
      </table>
    </div>
  </div>

  <div class="notice">※ 시세 조회·자산 추적 전용입니다. 실제 매수·매도는 MTS 앱에서 진행하세요.</div>
</div>

<script>
/* ═══════════════════════════════════
   팔레트 & 상수
═══════════════════════════════════ */
const LINE_COLS = ['#007aff','#ff9500','#34c759','#af52de','#ff3b30','#5ac8fa','#ff2d55','#30b0c7','#a2845e','#636366'];
const CAT_COLS  = { stock_kr:'#007aff', stock_us:'#ff9500', stock_jp:'#30b0c7', pension_personal:'#af52de', pension_retirement:'#34c759', crypto:'#ff3b30', cash:'#8e8e93' };
const CAT_LABELS= { stock_kr:'국내주식', stock_us:'미국주식', stock_jp:'일본주식', pension_personal:'개인연금', pension_retirement:'퇴직연금', crypto:'가상자산', cash:'현금' };

/* 종목명이 ETF 브랜드(TIGER/KODEX 등)로 시작하는지 판별 */
const ETF_BRANDS = /^(TIGER|KODEX|KINDEX|ARIRANG|HANARO|KBSTAR|ACE|SOL|히어로|TIMEFOLIO)/i;
function isETF(a) { return ETF_BRANDS.test(a.name); }

/* 도넛용 카테고리 분류: ETF → 'etf', 해외주식 → 'overseas', 국내주식 → 'domestic', 나머지 category 그대로 */

/* ═══════════════════════════════════
   야후 파이낸스 시세 조회
   - cors-anywhere 프록시 사용
   - 실패 시 allorigins 프록시 fallback
═══════════════════════════════════ */
const YAHOO_PROXY = 'https://corsproxy.io/?';

async function fetchYahoo(ticker) {
  const url = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=1d`;
  try {
    const res = await fetch(YAHOO_PROXY + encodeURIComponent(url), { signal: AbortSignal.timeout(8000) });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    const meta = json?.chart?.result?.[0]?.meta;
    if (!meta) throw new Error('no meta');
    return {
      price: meta.regularMarketPrice,
      prev:  meta.chartPreviousClose || meta.previousClose || meta.regularMarketPrice,
      ok: true
    };
  } catch(e) {
    return { ok: false, error: e.message };
  }
}

async function fetchFXRate(pair) {
  // pair: 'USDKRW=X' or 'JPYKRW=X'
  const url = `https://query1.finance.yahoo.com/v8/finance/chart/${pair}?interval=1d&range=1d`;
  try {
    const res = await fetch(YAHOO_PROXY + encodeURIComponent(url), { signal: AbortSignal.timeout(8000) });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    const price = json?.chart?.result?.[0]?.meta?.regularMarketPrice;
    return price || null;
  } catch(e) { return null; }
}

function setStatus(state, text) {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  dot.className = 'status-dot ' + state;
  txt.textContent = text;
}

let isFetching = false;
async function fetchAllPrices() {
  if (isFetching) return;
  isFetching = true;
  setStatus('loading', '시세 조회 중...');

  try {
    // 1. 환율 먼저
    const [usd, jpy] = await Promise.all([
      fetchFXRate('USDKRW=X'),
      fetchFXRate('JPYKRW=X')
    ]);
    if (usd) FX.USD = usd;
    if (jpy) FX.JPY = jpy;
    saveFX(); // 환율 localStorage 저장

    // 2. 종목별 시세
    const results = await Promise.allSettled(
      assets.filter(a => a.ticker && !['cash'].includes(a.category))
            .map(async a => {
              const r = await fetchYahoo(a.ticker);
              return { id: a.id, ...r };
            })
    );

    let ok = 0, fail = 0;
    results.forEach(r => {
      if (r.status === 'fulfilled' && r.value.ok) {
        const a = assets.find(x => x.id === r.value.id);
        if (a) {
          a.prevPrice = r.value.prev;
          a.currentPrice = r.value.price;
          ok++;
        }
      } else { fail++; }
    });

    saveAssets();
    renderAll();
    const now = new Date().toLocaleTimeString('ko-KR');
    if (fail === 0) {
      setStatus('ok', `갱신 완료 ${now} (야후 파이낸스 15~20분 지연)`);
    } else {
      setStatus('err', `${ok}개 성공 / ${fail}개 실패 — ${now}`);
    }
  } catch(e) {
    setStatus('err', '조회 실패: ' + e.message);
  } finally {
    isFetching = false;
  }
}

function toKRW(a, price) {
  if (a.currency === 'USD') return price * FX.USD;
  if (a.currency === 'JPY') return price * FX.JPY;
  return price;
}
function evKRW(a)   { return toKRW(a, a.currentPrice) * a.quantity; }
function costKRW(a) { return toKRW(a, a.avgPrice) * a.quantity; }
function totalEv()  { return assets.reduce((s,a) => s + evKRW(a), 0); }

function fmt(n) {
  const abs = Math.abs(n);
  if (abs >= 1e8) return (n/1e8).toFixed(2) + '억';
  if (abs >= 1e4) return (n/1e4).toFixed(1) + '만';
  return Math.round(n).toLocaleString('ko-KR') + '원';
}
function fmtPct(n) { return (n >= 0 ? '+' : '') + n.toFixed(2) + '%'; }
function fmtX(ts) {
  const d = new Date(ts);
  if (currentPeriod === '1D') {
    // 1D: HH:MM 시간만
    return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
  }
  if (['1W','1M'].includes(currentPeriod)) {
    // 1W/1M: MM/DD
    return String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0');
  }
  // 3M 이상: YY/MM
  return String(d.getFullYear()).slice(2)+'/'+String(d.getMonth()+1).padStart(2,'0');
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function updn(n) { return n >= 0 ? 'up' : 'dn'; }

function saveSnap() {
  const snaps = loadSnaps();
  snaps.push({ id:uid(), timestamp:Date.now(), totalValue:totalEv(), byAsset:Object.fromEntries(assets.map(a=>[a.id,evKRW(a)])) });
  if (snaps.length > 500) snaps.splice(0, snaps.length-500);
  saveSnaps(snaps);
  renderSnaps();
}
function deleteSnap(id) { saveSnaps(loadSnaps().filter(s=>s.id!==id)); renderSnaps(); }
function clearSnaps() {
  if (!confirm('스냅샷 이력을 모두 삭제할까요?')) return;
  saveSnaps([]);
  renderSnaps();
}
function generateFakeSnaps() {
  const base = totalEv(); const now = Date.now(); const snaps = [];
  for (let i=14; i>=0; i--) {
    const ts = now - i*86400000 - Math.random()*3600000;
    const noise = (Math.random()-.4)*0.04;
    snaps.push({ id:uid(), timestamp:ts, totalValue:Math.round(base*(1+noise*(14-i)/14)), byAsset:{} });
  }
  saveSnaps(snaps);
}
function renderSnaps() {
  const snaps = loadSnaps().slice().sort((a,b)=>b.timestamp-a.timestamp);
  const tb = document.getElementById('snapTbody');
  if (!snaps.length) { tb.innerHTML='<tr><td colspan="5" style="text-align:center;padding:24px;color:var(--color-text-tertiary)">저장된 스냅샷이 없습니다</td></tr>'; return; }
  tb.innerHTML = snaps.map((s,i)=>{
    const prev = snaps[i+1];
    const diff = prev ? s.totalValue-prev.totalValue : null;
    const pct  = prev ? (diff/prev.totalValue)*100 : null;
    return `<tr>
      <td style="text-align:left">${new Date(s.timestamp).toLocaleString('ko-KR')}</td>
      <td>${fmt(s.totalValue)}</td>
      <td class="col-hide-snap ${diff===null?'':(diff>=0?'up':'dn')}">${diff===null?'—':(diff>=0?'+':'')+fmt(diff)}</td>
      <td class="${pct===null?'':(pct>=0?'up':'dn')}">${pct===null?'—':fmtPct(pct)}</td>
      <td><button class="del-btn" onclick="deleteSnap('${s.id}')">🗑</button></td>
    </tr>`;
  }).join('');
}

/* ═══════════════════════════════════
   도넛 차트 (카테고리 — 레이블 직접 표시)
═══════════════════════════════════ */
function drawDonutWithLabels(canvasId, data) {
  const cv = document.getElementById(canvasId); if (!cv) return;
  const ctx = cv.getContext('2d');
  const dpr = window.devicePixelRatio || 1;

  // 논리 크기 — 좌우 레이블 공간 충분히 확보
  const LW = 340, LH = 280;
  const cx = LW/2, cy = LH/2;
  const OR = 86, IR = 52;

  cv.width  = Math.round(LW * dpr);
  cv.height = Math.round(LH * dpr);
  cv.style.width  = LW + 'px';
  cv.style.height = LH + 'px';
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, LW, LH);

  const total = data.reduce((s,d)=>s+d.value, 0); if (!total) return;
  let angle = -Math.PI/2;
  const GAP = 0.022;

  // ── 1패스: 세그먼트 ──
  data.forEach(d => {
    const sw = (d.value/total) * 2*Math.PI;
    ctx.beginPath();
    ctx.arc(cx, cy, OR, angle+GAP, angle+sw-GAP);
    ctx.arc(cx, cy, IR, angle+sw-GAP, angle+GAP, true);
    ctx.closePath();
    ctx.fillStyle = d.color;
    ctx.fill();
    angle += sw;
  });

  // 흰 센터
  ctx.beginPath(); ctx.arc(cx, cy, IR-2, 0, 2*Math.PI);
  ctx.fillStyle = '#ffffff'; ctx.fill();

  // ── 2패스: 인출선 + 레이블 ──
  angle = -Math.PI/2;
  data.forEach(d => {
    const sw = (d.value/total) * 2*Math.PI;
    if (sw > 0.15) {
      const mid  = angle + sw/2;
      const cosM = Math.cos(mid), sinM = Math.sin(mid);
      const isRight = cosM >= 0;

      // 인출선: 호 바깥 → 꺾임점 → 수평선
      const r1 = OR + 6;
      const r2 = OR + 22;
      const x1 = cx + cosM*r1, y1 = cy + sinM*r1;
      const x2 = cx + cosM*r2, y2 = cy + sinM*r2;

      // 수평선 길이: 세그먼트 작을수록 더 길게
      const hLen = sw < 0.4 ? 22 : 14;
      const x3 = x2 + (isRight ? hLen : -hLen);
      const y3 = y2;

      // 인출선 그리기
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.lineTo(x3, y3);
      ctx.strokeStyle = d.color;
      ctx.lineWidth = 1.2;
      ctx.stroke();

      // 텍스트 시작점
      const PAD = 4;
      let tx = x3 + (isRight ? PAD : -PAD);
      const ty = y3;

      // 경계 보호: 텍스트가 캔버스 밖으로 나가지 않도록
      const pct    = ((d.value/total)*100).toFixed(1) + '%';
      const fmtVal = fmt(d.value);
      ctx.font = `bold 11px Pretendard,-apple-system,sans-serif`;
      const pctW = ctx.measureText(pct).width;
      ctx.font = `10px Pretendard,-apple-system,sans-serif`;
      const valW = ctx.measureText(fmtVal).width;
      const maxW = Math.max(pctW, valW);

      if (!isRight) {
        // 왼쪽 정렬: tx - maxW >= 4
        tx = Math.max(tx, maxW + 4);
      } else {
        // 오른쪽 정렬: tx + maxW <= LW - 4
        tx = Math.min(tx, LW - maxW - 4);
      }

      ctx.textAlign = isRight ? 'left' : 'right';

      // % 텍스트
      ctx.font = `bold 11px Pretendard,-apple-system,sans-serif`;
      ctx.fillStyle = '#1c1c1e';
      ctx.fillText(pct, tx, ty - 2);

      // 금액 텍스트
      ctx.font = `10px Pretendard,-apple-system,sans-serif`;
      ctx.fillStyle = '#636366';
      ctx.fillText(fmtVal, tx, ty + 11);
    }
    angle += sw;
  });
}

async function fetchIndices() {
  const results = await Promise.allSettled(
    INDEX_LIST.map(async (item, i) => {
      const url = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(item.sym)}?interval=1d&range=2d`;
      const res = await fetch(YAHOO_PROXY + encodeURIComponent(url), { signal: AbortSignal.timeout(8000) });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const json = await res.json();
      const meta = json?.chart?.result?.[0]?.meta;
      if (!meta) throw new Error('no meta');
      const val  = meta.regularMarketPrice;
      const prev = meta.chartPreviousClose || meta.previousClose || val;
      const chg  = prev > 0 ? ((val - prev) / prev) * 100 : 0;
      return { i, val, chg };
    })
  );
  results.forEach(r => {
    if (r.status === 'fulfilled') {
      const { i, val, chg } = r.value;
      indices[i].val = val;
      indices[i].chg = Math.round(chg * 100) / 100;
    }
  });
  renderIndices();
}

// 시뮬레이션 함수 — 실제 데이터 있을 때는 미세 변동만
function simulateMarket() {
  indices.forEach(idx => {
    if (idx.val == null) return;
    const d = (Math.random() - 0.49) * 0.05;
    idx.val  = Math.round(idx.val * (1 + d/100) * 1000) / 1000;
    idx.chg  = Math.round((idx.chg + d * 0.1) * 100) / 100;
  });
  renderIndices();
}

/* ═══════════════════════════════════
   라인 차트
═══════════════════════════════════ */
let currentPeriod='1D', chartHistory=[], selectedAssets=new Set(), showSum=true;
let intraday1DCache = null; // 1D 인트라데이 캐시

/* ── 06:05 기준 기간 시작점 계산 ── */
function getPeriodStart(period) {
  const now = new Date();
  const d = new Date(now);

  function setTime605(date) {
    date.setHours(6, 5, 0, 0);
    return date;
  }

  if (period === '1D') {
    // 오늘 06:05 이전이면 어제 06:05, 이후면 오늘 06:05
    const todayStart = new Date(now); setTime605(todayStart);
    if (now < todayStart) todayStart.setDate(todayStart.getDate() - 1);
    return todayStart;
  }
  if (period === '1W') {
    // 이번주 월요일 06:05
    const mon = new Date(now);
    const day = mon.getDay(); // 0=일,1=월,...
    mon.setDate(mon.getDate() - (day === 0 ? 6 : day - 1));
    setTime605(mon);
    return mon;
  }
  if (period === '1M') {
    return new Date(now.getFullYear(), now.getMonth(), 1, 6, 5, 0);
  }
  if (period === '3M') {
    const m = now.getMonth() - 2;
    const y = now.getFullYear() + (m < 0 ? -1 : 0);
    return new Date(y, ((m % 12) + 12) % 12, 1, 6, 5, 0);
  }
  if (period === '6M') {
    const m = now.getMonth() - 5;
    const y = now.getFullYear() + (m < 0 ? -1 : 0);
    return new Date(y, ((m % 12) + 12) % 12, 1, 6, 5, 0);
  }
  if (period === 'YTD') {
    return new Date(now.getFullYear(), 0, 1, 6, 5, 0);
  }
  if (period === '1Y') {
    return new Date(now.getFullYear()-1, now.getMonth(), now.getDate(), 6, 5, 0);
  }
  if (period === '3Y') {
    return new Date(now.getFullYear()-3, now.getMonth(), now.getDate(), 6, 5, 0);
  }
  if (period === '5Y') {
    return new Date(now.getFullYear()-5, now.getMonth(), now.getDate(), 6, 5, 0);
  }
  // ALL: 첫 스냅샷 기준
  const snaps = loadSnaps();
  if (snaps.length) return new Date(Math.min(...snaps.map(s=>s.timestamp)));
  return new Date(now.getFullYear()-5, now.getMonth(), now.getDate(), 6, 5, 0);
}

/* ── 1D: 야후 파이낸스 5분봉 인트라데이 ── */
async function fetch1DIntraday() {
  setStatus('loading', '1D 시세 데이터 로딩 중...');
  const start = getPeriodStart('1D');
  const startTs = Math.floor(start.getTime() / 1000);
  const endTs   = Math.floor(Date.now() / 1000);

  // 종목별 5분봉 가져오기
  const results = await Promise.allSettled(
    assets.map(async a => {
      const url = `https://query1.finance.yahoo.com/v8/finance/chart/${a.ticker}?interval=5m&range=2d`;
      try {
        const res = await fetch(YAHOO_PROXY + encodeURIComponent(url), { signal: AbortSignal.timeout(10000) });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const json = await res.json();
        const result = json?.chart?.result?.[0];
        if (!result) throw new Error('no result');
        const timestamps = result.timestamp || [];
        const closes = result.indicators?.quote?.[0]?.close || [];
        // 06:05 이후 데이터만 필터링
        const points = [];
        timestamps.forEach((ts, i) => {
          if (ts >= startTs && ts <= endTs && closes[i] != null) {
            points.push({ ts: ts * 1000, price: closes[i] });
          }
        });
        return { id: a.id, points };
      } catch(e) {
        return { id: a.id, points: [] };
      }
    })
  );

  // 공통 타임스탬프 축 구성 (5분 간격, 시작~현재)
  const allTs = new Set();
  results.forEach(r => {
    if (r.status === 'fulfilled') r.value.points.forEach(p => allTs.add(p.ts));
  });
  const sortedTs = [...allTs].sort((a,b)=>a-b);
  if (!sortedTs.length) return null;

  // 각 시각별 원화 환산 합산
  const history = sortedTs.map(ts => {
    const byAsset = {};
    results.forEach((r, i) => {
      if (r.status !== 'fulfilled') return;
      const a = assets[i];
      const pts = r.value.points;
      // 해당 ts와 가장 가까운 이전 가격 사용
      let price = null;
      for (let j = pts.length-1; j >= 0; j--) {
        if (pts[j].ts <= ts) { price = pts[j].price; break; }
      }
      if (price == null && pts.length) price = pts[0].price;
      if (price != null) {
        byAsset[a.id] = Math.round(toKRW(a, price) * a.quantity);
      }
    });
    return { ts, byAsset };
  });

  // 시작점 추가 (06:05 시점 — 각 종목의 첫 가격 사용)
  if (history.length && history[0].ts > start.getTime() + 5*60*1000) {
    const firstByAsset = {};
    results.forEach((r, i) => {
      if (r.status !== 'fulfilled') return;
      const a = assets[i];
      const pts = r.value.points;
      if (pts.length) firstByAsset[a.id] = Math.round(toKRW(a, pts[0].price) * a.quantity);
    });
    history.unshift({ ts: start.getTime(), byAsset: firstByAsset });
  }

  // 끝점: 현재 평가금액
  if (history.length) {
    const last = history[history.length-1];
    assets.forEach(a => { last.byAsset[a.id] = Math.round(evKRW(a)); });
  }

  setStatus('ok', `1D 로딩 완료 (${new Date().toLocaleTimeString('ko-KR')})`);
  return history;
}

/* ── 1W~ALL: 스냅샷 기반 ── */
function buildSnapshotHistory(period) {
  const start = getPeriodStart(period);
  const startTs = start.getTime();
  const snaps = loadSnaps()
    .filter(s => s.timestamp >= startTs)
    .sort((a,b) => a.timestamp - b.timestamp);

  if (!snaps.length) {
    // 스냅샷 없으면 현재값만 찍음
    const byAsset = Object.fromEntries(assets.map(a=>[a.id, Math.round(evKRW(a))]));
    return [
      { ts: startTs, byAsset: Object.fromEntries(assets.map(a=>[a.id, Math.round(costKRW(a))])) },
      { ts: Date.now(), byAsset }
    ];
  }

  // 시작점 (period 기준점) 추가
  const history = [];
  // 시작점: 해당 시점 직전 스냅샷 or 첫 스냅샷 사용
  const beforeStart = loadSnaps()
    .filter(s => s.timestamp < startTs)
    .sort((a,b) => b.timestamp - a.timestamp)[0];

  if (beforeStart && Object.keys(beforeStart.byAsset).length) {
    history.push({ ts: startTs, byAsset: { ...beforeStart.byAsset } });
  } else if (snaps.length) {
    history.push({ ts: startTs, byAsset: { ...snaps[0].byAsset } });
  }

  // 중간 스냅샷들
  snaps.forEach(s => {
    if (Object.keys(s.byAsset).length) {
      history.push({ ts: s.timestamp, byAsset: { ...s.byAsset } });
    }
  });

  // 끝점: 현재 평가금액
  const nowByAsset = Object.fromEntries(assets.map(a=>[a.id, Math.round(evKRW(a))]));
  history.push({ ts: Date.now(), byAsset: nowByAsset });

  return history;
}

function setPeriod(p) {
  currentPeriod=p;
  document.querySelectorAll('#periodTabs button').forEach(b=>b.classList.toggle('active',b.textContent===p));
  buildChartHistory();

async function buildChartHistory() {
  if (currentPeriod === '1D') {
    // 1D: 야후 인트라데이 실데이터
    chartHistory = [];
    drawLineChart(); renderStatBar(); // 빈 차트 먼저 그림
    const data = await fetch1DIntraday();
    if (data && data.length >= 2) {
      chartHistory = data;
      intraday1DCache = data;
    } else {
      // 실패 시 스냅샷 fallback
      chartHistory = buildSnapshotHistory('1D');
      setStatus('err', '1D 인트라데이 실패 — 스냅샷으로 대체');
    }
  } else {
    // 1W~ALL: 스냅샷 기반
    chartHistory = buildSnapshotHistory(currentPeriod);
  }
  drawLineChart(); renderStatBar();
}
function drawLineChart() {
  const cv=document.getElementById('lineChart');
  const dpr=window.devicePixelRatio||1;
  const W=cv.parentElement.clientWidth||900, H=260;
  cv.width=Math.round(W*dpr); cv.height=Math.round(H*dpr);
  cv.style.width=W+'px'; cv.style.height=H+'px';
  const ctx=cv.getContext('2d'); ctx.scale(dpr,dpr); ctx.clearRect(0,0,W,H);
  const PAD={t:14,r:80,b:38,l:14};
  const gW=W-PAD.l-PAD.r, gH=H-PAD.t-PAD.b;
  if(!chartHistory.length) return;
  const lines=[];
  if(showSum)
    lines.push({label:'합계',vals:chartHistory.map(h=>Object.values(h.byAsset).reduce((s,v)=>s+v,0)),color:'#1c1c1e',lw:2.5});
  assets.forEach((a,i)=>{ if(selectedAssets.has(a.id)) lines.push({label:a.name,vals:chartHistory.map(h=>h.byAsset[a.id]||0),color:LINE_COLS[i%LINE_COLS.length],lw:1.5}); });
  if(!lines.length) return; // 선택된 항목 없으면 빈 차트
  const allVals=lines.flatMap(l=>l.vals);
  const minV=Math.min(...allVals)*0.995, maxV=Math.max(...allVals)*1.005, rng=maxV-minV||1;
  const toX=i=>PAD.l+(chartHistory.length>1?i/(chartHistory.length-1):0.5)*gW;
  const toY=v=>PAD.t+(1-(v-minV)/rng)*gH;
  // 격자
  ctx.strokeStyle='rgba(128,128,128,.1)'; ctx.lineWidth=1;
  for(let r=0;r<=4;r++){const y=PAD.t+(r/4)*gH;ctx.beginPath();ctx.moveTo(PAD.l,y);ctx.lineTo(PAD.l+gW,y);ctx.stroke();}
  // Y축 (오른쪽)
  ctx.fillStyle='#8e8e93';ctx.font='10px -apple-system,sans-serif';ctx.textAlign='left';
  for(let r=0;r<=4;r++){const y=PAD.t+(r/4)*gH;ctx.fillText(fmt(maxV-(r/4)*rng),PAD.l+gW+5,y+4);}
  // X축
  ctx.textAlign='center';ctx.fillStyle='#8e8e93';
  const xT=Math.min(6,chartHistory.length);
  for(let i=0;i<xT;i++){const idx=Math.round(i/(xT-1)*(chartHistory.length-1));ctx.fillText(fmtX(chartHistory[idx].ts),toX(idx),H-PAD.b+14);}
  // 라인
  lines.forEach(line=>{
    ctx.beginPath();ctx.strokeStyle=line.color;ctx.lineWidth=line.lw;ctx.lineJoin='round';ctx.lineCap='round';
    line.vals.forEach((v,i)=>{i===0?ctx.moveTo(toX(i),toY(v)):ctx.lineTo(toX(i),toY(v));});
    ctx.stroke();
    const lx=toX(line.vals.length-1),ly=toY(line.vals[line.vals.length-1]);
    ctx.beginPath();ctx.arc(lx,ly,4,0,2*Math.PI);ctx.fillStyle=line.color;ctx.fill();
    ctx.beginPath();ctx.arc(lx,ly,2.5,0,2*Math.PI);ctx.fillStyle='#fff';ctx.fill();
  });
}
function renderStatBar() {
  const bar=document.getElementById('statBar');
  const items = [
    ...(showSum ? [null] : []),
    ...[...selectedAssets].slice(0, showSum ? 3 : 4)
  ];
  if(!items.length) { bar.innerHTML=''; return; }
  bar.innerHTML=items.slice(0,4).map(id=>{
    const a=id?assets.find(x=>x.id===id):null;
    const vals=chartHistory.map(h=>{
      if(a) return h.byAsset[a.id]||0;
      return Object.values(h.byAsset).reduce((s,v)=>s+v,0);
    });
    if(!vals.length) return '';
    const first=vals[0],last=vals[vals.length-1],hi=Math.max(...vals),lo=Math.min(...vals);
    const diff=last-first,pct=first>0?(diff/first)*100:0;
    return `<div class="stat-item">
      <div class="stat-label">${a?a.name:'합계'}</div>
      <div class="stat-val ${updn(diff)}">${diff>=0?'+':''}${fmt(diff)} (${fmtPct(pct)})</div>
      <div class="stat-sub">고: ${fmt(hi)} · 저: ${fmt(lo)}</div>
    </div>`;
  }).join('');
}
function renderToggles() {
  const allSelected = assets.every(a => selectedAssets.has(a.id));
  document.getElementById('assetToggles').innerHTML =
    `<button class="toggle-ctrl" onclick="toggleAll()" style="background:${allSelected?'#1c1c1e':'var(--color-section-bg)'};color:${allSelected?'#fff':'var(--color-text-primary)'}">
      ${allSelected ? '전체 해제' : '전체 선택'}
    </button>
     <button class="toggle-ctrl" onclick="toggleSum()" style="background:${showSum?'#007aff':'var(--color-section-bg)'};color:${showSum?'#fff':'var(--color-text-primary)'}">합계</button>`
    + assets.map((a,i)=>`
     <button class="toggle-pill ${selectedAssets.has(a.id)?'on':''}"
       style="background:${LINE_COLS[i%LINE_COLS.length]}22;color:${LINE_COLS[i%LINE_COLS.length]};${selectedAssets.has(a.id)?`outline:2px solid ${LINE_COLS[i%LINE_COLS.length]};outline-offset:-2px`:''}"
       onclick="toggleAsset('${a.id}')">${a.name}</button>`).join('');
}
function toggleAsset(id) { selectedAssets.has(id)?selectedAssets.delete(id):selectedAssets.add(id); renderToggles(); drawLineChart(); renderStatBar(); }
function toggleSum() { showSum=!showSum; renderToggles(); drawLineChart(); renderStatBar(); }
function toggleAll() {
  const allSelected = assets.every(a => selectedAssets.has(a.id));
  if (allSelected) selectedAssets.clear();
  else assets.forEach(a => selectedAssets.add(a.id));
  renderToggles(); drawLineChart(); renderStatBar();
}

function confirmSaveSheets() {

  try {

    const cost  = assets.reduce((s,a)=>s+costKRW(a),0);
    const pnl   = total - cost;
    const rtn   = cost > 0 ? (pnl/cost)*100 : 0;
    const snaps = loadSnaps().slice().sort((a,b)=>a.timestamp-b.timestamp);

    // 원 단위 숫자를 콤마 포함 텍스트로 변환 (##### 방지)
    function wonFmt(n) {
      return Math.round(n).toLocaleString('ko-KR') + '원';
    }
    // 소수점 가격 (USD/JPY)
    function priceFmt(n, currency) {
      if (currency === 'USD') return '$' + n.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
      if (currency === 'JPY') return '¥' + n.toLocaleString('ja-JP', {minimumFractionDigits:0});
      return Math.round(n).toLocaleString('ko-KR') + '원';
    }

    function toCSV(rows) {
      return rows.map(r =>
        r.map(c => {
          const s = String(c ?? '');
          // 항상 따옴표로 감싸서 콤마·특수문자 안전하게 처리
          return `"${s.replace(/"/g,'""')}"`;
        }).join(',')
      ).join('\n');
    }

    // ── 탭1: 자산목록 ──
    const assetRows = [
      [`저장시각: ${now}`],
      [],
      ['종목명','티커','구분','현재가','평균단가','통화','수량',
       '투자원금','평가금액','평가손익','수익률(%)','전일대비(%)'],
      ...assets.map(a => {
        const ev=evKRW(a), c=costKRW(a), p=ev-c, r=c>0?(p/c)*100:0;
        const dayChg = a.prevPrice>0 ? ((a.currentPrice-a.prevPrice)/a.prevPrice)*100 : 0;
        return [
          a.name,
          a.ticker,
          CAT_LABELS[a.category]||a.category,
          priceFmt(a.currentPrice, a.currency),
          priceFmt(a.avgPrice, a.currency),
          a.currency,
          a.quantity.toLocaleString('ko-KR'),
          wonFmt(c),
          wonFmt(ev),
          (p>=0?'+':'') + wonFmt(p),
          (r>=0?'+':'') + r.toFixed(2) + '%',
          (dayChg>=0?'+':'') + dayChg.toFixed(2) + '%',
        ];
      }),
      [],
      ['','','','','','','합계',
        wonFmt(cost), wonFmt(total),
        (pnl>=0?'+':'') + wonFmt(pnl),
        (rtn>=0?'+':'') + rtn.toFixed(2) + '%', ''
      ],
    ];

    // ── 탭2: 카테고리 비중 ──
    const catMap = {};
    assets.forEach(a => { const k=donutCatKey(a); catMap[k]=(catMap[k]||0)+evKRW(a); });
    const catRows = [
      [`저장시각: ${now}`],
      [],
      ['카테고리','평가금액','비중(%)'],
      ...Object.entries(catMap)
        .sort((a,b)=>b[1]-a[1])
        .map(([k,v])=>[
          DONUT_CAT_LABELS[k]||k,
          wonFmt(v),
          ((v/total)*100).toFixed(2)+'%'
        ]),
      [],
      ['합계', wonFmt(total), '100.00%'],
    ];

    // ── 탭3: 종목 비중 ──
    const assetBiasRows = [
      [`저장시각: ${now}`],
      [],
      ['종목명','평가금액','비중(%)'],
      ...assets
        .map(a=>({name:a.name, ev:evKRW(a)}))
        .sort((a,b)=>b.ev-a.ev)
        .map(a=>[
          a.name,
          wonFmt(a.ev),
          ((a.ev/total)*100).toFixed(2)+'%'
        ]),
      [],
      ['합계', wonFmt(total), '100.00%'],
    ];

    // ── 탭4: 스냅샷 이력 ──
    const snapRows = [
      ['저장시각','총평가금액','전대비변화','변화율(%)'],
      ...snaps.map((s,i) => {
        const prev = snaps[i-1];
        const diff = prev ? s.totalValue - prev.totalValue : null;
        const pct  = prev && prev.totalValue>0 ? ((diff/prev.totalValue)*100).toFixed(2)+'%' : '';
        return [
          new Date(s.timestamp).toLocaleString('ko-KR'),
          wonFmt(s.totalValue),
          diff !== null ? (diff>=0?'+':'') + wonFmt(diff) : '',
          pct
        ];
      }),
    ];

    // ── 원복 가이드 ──
    const restoreRows = [
      ['=== 대시보드 원복 방법 ==='],
      [],
      ['1. Claude(claude.ai)에 이 CSV 파일을 업로드'],
      ['2. "이 CSV 데이터로 포트폴리오 대시보드를 원복해줘"라고 요청'],
      ['3. Claude가 자산목록 탭의 데이터를 읽어 index.html 재생성'],
      [],
      ['=== 핵심 원복 데이터 ==='],
      ['종목명','티커','통화','수량','평균단가'],
      ...assets.map(a=>[
        a.name, a.ticker, a.currency,
        a.quantity,
        priceFmt(a.avgPrice, a.currency)
      ]),
    ];

    // ── 전체 CSV 합치기 ──
    const BOM = '\uFEFF';
    const fullCSV = BOM + [
      '===== 자산목록 =====',     toCSV(assetRows),     '',
      '===== 카테고리비중 =====', toCSV(catRows),       '',
      '===== 종목비중 =====',     toCSV(assetBiasRows), '',
      '===== 스냅샷이력 =====',   toCSV(snapRows),      '',
      '===== 원복가이드 =====',   toCSV(restoreRows),
    ].join('\n');

    // ── 다운로드 ──
    const blob = new Blob([fullCSV], { type: 'text/csv;charset=utf-8;' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = `${fileName}.csv`;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);

    statusEl.innerHTML = `✅ <b>${fileName}.csv</b> 다운로드 완료!<br>
      <span style="font-size:11px;color:#636366;">
        구글 드라이브 앱 → + 버튼 → 파일 업로드 → 다운로드된 CSV 선택
      </span>`;
    saveBtn.textContent = '완료';
    setTimeout(() => {
      closeSheetModal();
      saveBtn.disabled = false;
      saveBtn.textContent = '저장';
    }, 4000);

  } catch(e) {
    statusEl.textContent = '❌ 오류: ' + e.message;
    saveBtn.disabled = false;
    saveBtn.textContent = '저장';
  }
}

/* ═══════════════════════════════════
   전체 렌더 + 초기화
═══════════════════════════════════ */
function renderAll() {
  renderTable(); renderSummary(); renderDonuts();
  buildChartHistory(); // async — 차트는 데이터 오면 자동 갱신
  renderToggles();
}

// 자동 스냅샷 — 시장 사이클 7회 (야후 파이낸스 20분 지연 반영)
// 05:25 미국장 마감 직후 (서머타임 05:00 + 20분)
// 06:25 미국장 마감 직후 (겨울시간 06:00 + 20분)
// 09:25 한국·일본장 개장 직후 (09:00 + 20분)
// 15:20 한국·일본장 마감 직전 (15:00 + 20분)
// 15:55 한국·일본장 마감 직후 (15:30 + 20분)
// 22:50 미국장 개장 직전 (22:30 + 20분)
// 23:00 미국장 개장 직후 (22:35 + 20분)
const AUTO_SNAP_TIMES = [
  { h:5,  m:25 },
  { h:6,  m:25 },
  { h:9,  m:25 },
  { h:15, m:20 },
  { h:15, m:55 },
  { h:22, m:50 },
  { h:23, m:0  },
];
// 각 시각별 마지막 실행 날짜 추적 (중복 방지)
const snapFiredDate = {};
AUTO_SNAP_TIMES.forEach(t => { snapFiredDate[`${t.h}:${t.m}`] = ''; });

setInterval(async () => {
  const now = new Date();
  const dateStr = now.toDateString();
  const h = now.getHours(), m = now.getMinutes();
  AUTO_SNAP_TIMES.forEach(t => {
    const key = `${t.h}:${t.m}`;
    if (h === t.h && m === t.m && snapFiredDate[key] !== dateStr) {
      snapFiredDate[key] = dateStr;
      // 스냅샷 전 시세 먼저 갱신
      fetchAllPrices().then(() => {
        saveSnap();
        renderSnaps();
      });
    }
  });
}, 30000); // 30초마다 체크 (1분보다 촘촘하게)

// 야후 파이낸스 15분마다 자동 갱신 + 1D 차트 갱신
setInterval(async ()=>{
  await fetchAllPrices();
  if(currentPeriod==='1D') buildChartHistory();
}, 15*60*1000);

// 글로벌 지수 시뮬레이션 30초
setInterval(simulateMarket, 30000);

window.addEventListener('resize',()=>drawLineChart());

(async function init(){
  renderAll(); renderSnaps(); renderIndices();
  fetchIndices(); // 실제 지수 데이터 로드
  setStatus('ok','초기 데이터 로드 완료 — 🔄 버튼으로 최신 시세 갱신');
})();

// 지수 15분마다 자동 갱신
setInterval(fetchIndices, 15*60*1000);
</script>
